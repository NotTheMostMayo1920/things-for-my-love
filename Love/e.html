<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feliz primer mes juntos ♥</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Great+Vibes&family=Raleway:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="particles" id="particles" aria-hidden="true"></div>
  <audio id="bgAudio" preload="auto" loop autoplay>
    <source src="J�sean Log - Beso (Audio Oficial).MP3" type="audio/mpeg">
  </audio>
  <button class="audio-fab" id="audioToggle" type="button" aria-label="Activar música de fondo" aria-pressed="false">
    <span class="audio-fab__icon" aria-hidden="true">♪</span>
  </button>
  <button class="heart-fab" id="heartBurst" type="button" aria-label="Lanzar corazones" title="Lanzar corazones">
    <span class="heart-fab__icon" aria-hidden="true">♥</span>
  </button>

  <header class="hero" id="inicio">
    <div class="hero__ornament hero__ornament--top" aria-hidden="true"></div>
    <div class="hero__content">
      <h1 class="hero__title">Feliz primer mes juntos <span class="heart">♥︎</span></h1>
      <p class="hero__subtitle">"Amor poder amarte."</p>
    </div>
    <nav class="nav-menu" aria-label="Secciones">
      <button class="nav-menu__btn" data-modal="carta">Gracias por dejarme amarte</button>
      <button class="nav-menu__btn" data-modal="cosas">Las cosas que amo de ti</button>
      <button class="nav-menu__btn" data-modal="canciones">Canciones que te dedico</button>
      <button class="nav-menu__btn" data-modal="recuerdos">Lo que me recuerda a ti</button>
      <button class="nav-menu__btn" data-modal="momentos">Los momentos que hemos vivido que amo</button>
      <button class="nav-menu__btn" data-modal="ships">Parejas/ships que me recuerdan a nosotros</button>
    </nav>
    <div class="hero__ornament hero__ornament--bottom" aria-hidden="true"></div>
  </header>

  <!-- Modal overlay -->
  <div class="modal-overlay" id="modalOverlay" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <button class="modal__close" id="modalClose" aria-label="Cerrar">&times;</button>
      <h2 class="modal__title" id="modalTitle"></h2>
      <div class="modal__body" id="modalBody"></div>
    </div>
  </div>

  <footer class="footer">
    <p class="footer__main">¡Gracias por amarme y nunca rendirte conmigo!, yo tampoco me rendiré contigo ♡.</p>
    <p class="footer__sub"><span class="te-amo">Te amo</span> más de lo que las palabras pudieran describir</p>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
